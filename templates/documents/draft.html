{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto py-8 px-4">
    <!-- Header Section -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-800">Create New Draft</h1>
        <p class="text-slate-500 mt-1">Prepare your legislative measure. Use the AI assistant for legal basis research.</p>
    </div>

    <!-- Main Form Card -->
    <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
        <form action="{% url 'create_draft' %}" method="POST" id="draftForm" class="p-8">
            {% csrf_token %}
            
            <!-- CRITICAL: Hidden field to link Autosave to this Form -->
            <input type="hidden" name="doc_id" id="doc_id_field">

            <!-- 1. Legislative Title -->
            <div class="mb-8">
                <label class="block text-slate-700 text-sm font-semibold mb-2">Legislative Title</label>
                <input type="text" name="title" required 
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" 
                       placeholder="Ex: An Ordinance Regulating...">
            </div>

            <!-- 2. Type and Author -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-slate-700 text-sm font-semibold mb-2">Measure Type</label>
                    <select name="type" class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="ORDINANCE">Ordinance</option>
                        <option value="RESOLUTION">Resolution</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-700 text-sm font-semibold mb-2">Primary Author</label>
                    <input type="text" class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 text-slate-500 cursor-not-allowed" 
                           value="Hon. {{ user.username }} (You)" readonly>
                </div>
            </div>

            <!-- 3. Target Committee -->
            <div class="mb-8 bg-slate-50 p-6 rounded-xl border border-slate-200">
                <label class="block text-slate-700 text-sm font-bold mb-2">Sponsor Committee</label>
                <select name="target_committee" class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="" disabled selected>-- Select a Committee --</option>
                    {% for committee in committees %}
                        <option value="{{ committee.id }}">Committee on {{ committee.committee_name }}</option>                    
                    {% endfor %}
                </select>
            </div>

            <!-- 4. Content Area -->
            <div class="mb-8">
                <label class="block text-slate-700 text-sm font-semibold mb-2">Draft Content</label>
                <textarea name="content" required 
                          class="w-full h-80 px-4 py-4 border border-slate-300 rounded-lg font-mono text-sm focus:ring-2 focus:ring-blue-500 outline-none leading-relaxed" 
                          placeholder="WHEREAS..."></textarea>
            </div>

            <!-- AI Section -->
            <div class="mt-4 mb-8 pt-8 border-t border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <label class="text-purple-900 text-sm font-bold flex items-center">
                        <i class="fas fa-robot mr-2"></i> AI Legal Basis Assistant
                    </label>
                    <button type="button" id="aiCheckBtn" class="bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold px-4 py-2 rounded-lg shadow transition">
                        Find Legal Basis
                    </button>
                </div>
                <div id="aiResults" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-6 text-sm text-slate-800 shadow-inner">
                    <div id="aiContent" class="prose prose-sm max-w-none"></div>
                </div>
            </div>

            <!-- Action Buttons (Only 2 as requested) -->
            <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 pt-6 border-t border-slate-100">
                <button type="submit" name="action" value="save" class="px-8 py-3 rounded-lg border border-slate-300 text-slate-600 font-bold hover:bg-slate-50 transition">
                    <i class="fas fa-save mr-2"></i> Save Draft
                </button>
                <button type="submit" name="action" value="submit" class="bg-blue-900 text-white px-10 py-3 rounded-lg font-bold hover:bg-blue-800 shadow-lg transition transform active:scale-95">
                    <i class="fas fa-paper-plane mr-2"></i> File Draft
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Autosave Status Indicator -->
<div id="autosave-status" class="fixed bottom-6 right-6 text-[10px] font-bold uppercase tracking-widest text-slate-400 bg-white px-4 py-2 rounded-full shadow-lg border border-slate-100 hidden">
    <i class="fas fa-check-circle mr-2 text-emerald-500"></i> Synced to Cloud
</div>

<script>
    const titleInput = document.querySelector('input[name="title"]');
    const contentInput = document.querySelector('textarea[name="content"]');
    const docIdInput = document.getElementById('doc_id_field');
    const statusIndicator = document.getElementById('autosave-status');

    // 1. RECOVERY LOGIC
    window.onload = function() {
        const savedTitle = localStorage.getItem('draft_title');
        const savedContent = localStorage.getItem('draft_content');
        const savedId = localStorage.getItem('current_doc_id');

        if (savedTitle || savedContent) {
            if (confirm("Restore unsaved work from your last session?")) {
                titleInput.value = savedTitle;
                contentInput.value = savedContent;
                if(savedId) docIdInput.value = savedId;
            } else {
                localStorage.clear();
            }
        }
    };

    // 2. LOCAL CACHE
    function localSave() {
        localStorage.setItem('draft_title', titleInput.value);
        localStorage.setItem('draft_content', contentInput.value);
    }

    // 3. SERVER SYNC (Every 30s)
    function serverSync() {
        if (!titleInput.value && !contentInput.value) return;

        fetch("{% url 'autosave_draft' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({
                title: titleInput.value,
                content: contentInput.value,
                doc_id: localStorage.getItem('current_doc_id')
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'saved') {
                localStorage.setItem('current_doc_id', data.doc_id);
                docIdInput.value = data.doc_id; // Update hidden field
                showStatus();
            }
        })
        .catch(err => console.log("Offline mode: saving locally only."));
    }

    function showStatus() {
        statusIndicator.classList.remove('hidden');
        setTimeout(() => statusIndicator.classList.add('hidden'), 3000);
    }

    titleInput.addEventListener('input', localSave);
    contentInput.addEventListener('input', localSave);
    setInterval(localSave, 2000); 
    setInterval(serverSync, 30000); 

    // CLEAR CACHE ON FORM SUBMIT
    document.getElementById('draftForm').onsubmit = function() {
        localStorage.clear();
    };

    // AI Logic
    document.getElementById('aiCheckBtn').addEventListener('click', function() {
        const title = titleInput.value;
        const content = contentInput.value;
        if(!title || !content) { alert("Please fill Title and Content."); return; }
        
        this.disabled = true;
        this.innerText = "Searching...";

        fetch("", {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({ title: title, content: content })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('aiResults').classList.remove('hidden');
            document.getElementById('aiContent').innerHTML = data.basis;
        })
        .finally(() => {
            this.disabled = false;
            this.innerText = "Find Legal Basis";
        });
    });
</script>
{% endblock %}
